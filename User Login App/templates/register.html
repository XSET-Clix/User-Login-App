<!DOCTYPE html>
<html>
    <head>
        <title>
            Register
        </title>
        <link rel="stylesheet" type="text/css" href="/static/style.css">
    </head>
    <body>
        <div align="center">
        <div align="center" class="border">
        <div class="header">
        <h1 class="word">Register</h1>
        </div>
        <h2 class="word">
        <form action="/register" method="POST">
        <div class="msg">{{msg}}</div>
        <input id="username" name="username" type="text" placeholder="Enter your username" class="textbox"></br></br>
        <input id="password" name="password" type="password" placeholder="Enter your password" class="textbox"></br></br>
        <input id="email" name="email" type="text" placeholder="Enter your email" class="textbox"></br></br>
        <input type = "submit" value="Register" class="btn"></br></br>
        </form>
        </h2>
        <p class="bottom">Already have an account? <a class="bottom" href="/templates/login.html">Sign up here</a></p>
        </div>
        </div>
    </body>
</html>
